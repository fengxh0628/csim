constants:
  startdate: 20210101
  enddate: 20231231
  booksize: 20
  verbose: true
  warmup: 5      # 5 days warmup before generating signals
  rebalance_times: "00:00"  # UTC, 北京时间 08:00
  datacache: /Users/fengxh/csimcache
  mode: w        # w=write (load data), r=read-only (skip data loading)
  interval: 5m   # bar interval: 1m, 5m, 15m, 1h

universe:
  symbols: /Users/fengxh/csim/data/universe_top50_liquid.txt
  cache_startdate: 20200101
  cache_enddate: 20260731

modules:
  # Data managers
  - id: klines
    path: /Users/fengxh/csim/modules/dmgrklines.py
    datapath: /Users/fengxh/binance_data
    handler: datahandler

  - id: fundingrate
    path: /Users/fengxh/csim/modules/dmgrfundingrate.py
    datapath: /Users/fengxh/binance_data
    handler: datahandler

  - id: universe
    path: /Users/fengxh/csim/modules/dmgruniverse.py
    handler: datahandler
    top_n: 50
    lookback_months: 12

  # Stats
  - id: statssimple
    path: /Users/fengxh/csim/modules/statssimple.py
    handler: statshandler

  # Alpha modules
  - id: corr
    path: /Users/fengxh/csim/work/code/corr.py
    handler: alphahandler
  - id: mstd
    path: /Users/fengxh/csim/work/code/mstd.py
    handler: alphahandler
  - id: rskew
    path: /Users/fengxh/csim/work/code/rskew.py
    handler: alphahandler
  - id: rsud
    path: /Users/fengxh/csim/work/code/rsud.py
    handler: alphahandler
  - id: skew
    path: /Users/fengxh/csim/work/code/skew.py
    handler: alphahandler
  - id: combosimple
    path: /Users/fengxh/csim/modules/combosimple.py
    handler: alphahandler

  # Operations
  - id: opdecay
    path: /Users/fengxh/csim/modules/opdecay.py
    handler: ophandler
  - id: opemadecay
    path: /Users/fengxh/csim/modules/opemadecay.py
    handler: ophandler
  - id: opzscore
    path: /Users/fengxh/csim/modules/opzscore.py
    handler: ophandler
  - id: opprofitana
    path: /Users/fengxh/csim/modules/opprofitana.py
    handler: ophandler
  - id: oppower
    path: /Users/fengxh/csim/modules/oppower.py
    handler: ophandler
  - id: opdump
    path: /Users/fengxh/csim/modules/opdump.py
    handler: ophandler
  - id: opwinsorize
    path: /Users/fengxh/csim/modules/opwinsorize.py
    handler: ophandler
  - id: optopn
    path: /Users/fengxh/csim/modules/optopn.py
    handler: ophandler
  - id: opriskneut
    path: /Users/fengxh/csim/modules/opriskneut.py
    handler: ophandler
  - id: riskfactors
    path: /Users/fengxh/csim/modules/dmgrriskfactors.py
    handler: datahandler
    lookback: 20

stats: { moduleId: statssimple, trading_cost: 0.001 }

portfolio:
  moduleId: combosimple
  id: combo
  children:
    - moduleId: corr
      id: corr
      lookback: 1d
      data1: taker_buy_volume
      data2: volume
      direction: -1
      operations:
        - { moduleId: opemadecay, itvls: 6 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: corr
      id: corr_2
      lookback: 3d
      data1: close
      data2: low
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opemadecay, itvls: 8 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: mstd
      id: mstd
      direction: -1
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opriskneut, factor: risk.beta }
        # - { moduleId: opemadecay, itvls: 2 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: rskew
      id: rskew
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opdecay, itvls: 3 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: rskew
      id: rskew_2
      data1: high
      data2: low
      lookback: 4d
      direction: -1
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opemadecay, itvls: 3 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: rsud
      id: rsud
      direction: -1
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opriskneut, factor: risk.beta }
        - { moduleId: opemadecay, itvls: 8 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: skew
      id: skew
      direction: -1
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opemadecay, itvls: 10 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: corr
      id: corr
      lookback: 1d
      data1: taker_buy_volume
      data2: volume
      direction: -1
      operations:
        - { moduleId: opemadecay, itvls: 6 }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
  operations:
    - { moduleId: oppower }
    - { moduleId: optopn, long_n: 5, short_n: 5 }
    - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - { moduleId: opdump, dumpdir: dumps }
