constants:
  startdate: 20210101
  enddate: 20241231
  booksize: 20
  verbose: true
  warmup: 5      # 5 days warmup before generating signals
  rebalance_times: "00:00"  # UTC, 北京时间 08:00
  datacache: /home/fengxh/csimcache
  mode: r        # w=write (load data), r=read-only (skip data loading)
  interval: 5m   # bar interval: 1m, 5m, 15m, 1h

universe:
  symbols: /home/fengxh/csim/data/universe_top50_lookback12m_liquid.txt
  cache_startdate: 20200101
  cache_enddate: 20260731

modules:
  # Data managers
  - id: klines
    path: /home/fengxh/csim/modules/dmgrklines.py
    datapath: /home/fengxh/binance_data
    handler: datahandler

  - id: premiumIndexKlines
    path: /home/fengxh/csim/modules/dmgrpremiumindexklines.py
    datapath: /home/fengxh/binance_data
    handler: datahandler

  - id: universe
    path: /home/fengxh/csim/modules/dmgruniverse.py
    handler: datahandler
    top_n: 50
    lookback_months: 12

  # Stats
  - id: statssimple
    path: /home/fengxh/csim/modules/statssimple.py
    handler: statshandler

  # Alpha modules
  - id: corr
    path: /home/fengxh/csim/candidates/code/corr.py
    handler: alphahandler
  - id: mstd
    path: /home/fengxh/csim/candidates/code/mstd.py
    handler: alphahandler
  - id: rskew
    path: /home/fengxh/csim/candidates/code/rskew.py
    handler: alphahandler
  - id: rsud
    path: /home/fengxh/csim/candidates/code/rsud.py
    handler: alphahandler
  - id: skew
    path: /home/fengxh/csim/candidates/code/skew.py
    handler: alphahandler
  - id: combosimple
    path: /home/fengxh/csim/modules/combosimple.py
    handler: alphahandler

  # Operations
  - id: opdecay
    path: /home/fengxh/csim/modules/opdecay.py
    handler: ophandler
  - id: opemadecay
    path: /home/fengxh/csim/modules/opemadecay.py
    handler: ophandler
  - id: opzscore
    path: /home/fengxh/csim/modules/opzscore.py
    handler: ophandler
  - id: opprofitana
    path: /home/fengxh/csim/modules/opprofitana.py
    handler: ophandler
  - id: oppower
    path: /home/fengxh/csim/modules/oppower.py
    handler: ophandler
  - id: opdump
    path: /home/fengxh/csim/modules/opdump.py
    handler: ophandler
  - id: opwinsorize
    path: /home/fengxh/csim/modules/opwinsorize.py
    handler: ophandler
  - id: optopn
    path: /home/fengxh/csim/modules/optopn.py
    handler: ophandler
  - id: opriskneut
    path: /home/fengxh/csim/modules/opriskneut.py
    handler: ophandler
  - id: opgroupneut
    path: /home/fengxh/csim/modules/opgroupneut.py
    handler: ophandler
  - id: riskfactors
    path: /home/fengxh/csim/modules/dmgrriskfactors.py
    handler: datahandler
    lookback: 20

  - id: grouping
    path: /home/fengxh/csim/modules/dmgrgrouping.py
    handler: datahandler
    lookback: 90

stats: { moduleId: statssimple, trading_cost: 0.001 }

portfolio:
  moduleId: combosimple
  id: combo2_k5r
  children:
    - moduleId: corr
      id: corr_2
      lookback: 3d
      data1: close
      data2: low
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opemadecay, itvls: 8d }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: mstd
      id: mstd
      direction: -1
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opriskneut, factor: risk.beta }
        # - { moduleId: opemadecay, itvls: 2d }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - moduleId: rskew
      id: rskew_2
      data1: high
      data2: low
      lookback: 4d
      direction: -1
      operations:
        - { moduleId: opwinsorize }
        - { moduleId: opemadecay, itvls: 3d }
        - { moduleId: oppower }
        - { moduleId: opprofitana, split: 5, startdate: 20210101 }
  operations:
    # - { moduleId: oppower }
    - { moduleId: opgroupneut, field: group.k5r }
    - { moduleId: oppower }
    - { moduleId: optopn, long_n: 10, short_n: 10 }
    - { moduleId: opprofitana, split: 5, startdate: 20210101 }
    - { moduleId: opdump, dumpdir: dumps }
