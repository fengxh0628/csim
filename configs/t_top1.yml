    datapath: /Users/fengxh/binance_data
    handler: datahandler
  - id: universe
    path: modules/dmgruniverse.py
    handler: datahandler
    top_n: 50
    lookback_months: 12
  - id: statssimple
    path: modules/statssimple.py
    handler: statshandler
  - id: alphamomentum
    path: modules/alphamomentum.py
    handler: alphahandler
  - id: alphareversal
    path: modules/alphareversal.py
    handler: alphahandler
  - id: alphavolume
    path: modules/alphavolume.py
    handler: alphahandler
  - id: alphaintraday
    path: modules/alphaintraday.py
    handler: alphahandler
  - id: combosimple
    path: modules/combosimple.py
    handler: alphahandler
  - id: opdecay
