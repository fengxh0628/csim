stats:
  moduleId: statssimple
  trading_cost: 0.001

portfolio:
  moduleId: alphavolume
  id: t_top1
  signal: taker_ratio
  lookback: 5d
  operations:
    - moduleId: opdecay
      itvls: 15d
    - moduleId: oppower
    - moduleId: optopn
      long_n: 1
      short_n: 1
    - moduleId: opprofitana
      split: 5
    - moduleId: opdump
      dumpdir: dumps
